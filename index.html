<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChPriv - Chat Privata</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="startup">
        <h1>ChPriv</h1>
        <input type="text" id="nickname" placeholder="Il tuo nickname">
        <input type="password" id="password" placeholder="Password stanza">
        <div class="buttons">
            <button id="btnCreateRoom">CREA CHAT</button>
            <button id="btnJoinRoom">ENTRA</button>
        </div>
    </div>

    <div id="chatContainer" class="hidden">
        <header>
            <div id="otherInfo">In attesa dell'altro utente...</div>
            <div class="topButtons">
                <button id="copyLinkBtn">Copia Link</button>
                <button id="exitBtn">Esci</button>
            </div>
        </header>
        <div id="messages"></div>
        <div id="emojiBar">
            <span onclick="document.getElementById('messageInput').value += '😊'">😊</span>
            <span onclick="document.getElementById('messageInput').value += '🔥'">🔥</span>
            <span onclick="document.getElementById('messageInput').value += '🚀'">🚀</span>
            <span onclick="document.getElementById('messageInput').value += '🔒'">🔒</span>
        </div>
        <div id="composer">
            <input type="text" id="messageInput" placeholder="Scrivi un messaggio...">
            <button id="sendBtn">Invia</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
