<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChPriv - Chat Privata</title>
    <link rel="icon" type="image/png" href="favicon.png">        
    <link rel="stylesheet" href="style.css?v=2.2">
    <script type="module" src="app.js?v=2.2"></script>
</head>
<body>

    <div id="startup">
        <img src="logo.png" alt="Logo" class="main-logo">
        <input type="text" id="nickname" placeholder="Il tuo nickname">
        <input type="password" id="password" placeholder="Password stanza">
        <div class="buttons">
            <button id="btnCreateRoom">CREA CHAT</button>
            <button id="btnJoinRoom">ENTRA</button>
        </div>
    </div>

    <div id="chatContainer" class="hidden">
        <header>
            <div id="otherInfo">In attesa...</div>
            <img src="logo.png" alt="Logo" class="header-logo">
            <div class="topButtons">
                <button id="copyLinkBtn">Copia Link</button>
                <button id="clearBtn">Svuota</button>
                <button id="exitBtn">Esci</button>
            </div>
        </header>
        
        <div id="messages"></div>

        <div id="emojiPicker" class="hidden">
            <span>🍒</span><span>🥔</span><span>🍌</span><span>🥖</span><span>🕯️</span>
            <span>⛺️</span><span>👙</span><span>👊</span><span>🐋</span><span>🚰</span>
            <span>🌡️</span><span>🍆</span><span>💦</span><span>🟣</span><span>🐷</span>
            <span>💧</span><span>😜</span><span>👅</span><span>🫂</span><span>💆‍♀️</span>
        </div>

        <div id="composer">
            <button id="emojiBtn">😊</button>
            <input type="text" id="messageInput" placeholder="Scrivi un messaggio...">
            <button id="sendBtn">Invia</button>
        </div>
    </div>

    <script type="module" src="app.js" defer></script>
</body>
</html>
